<style>
body {
    font-family: Didot, serif;
    background-image: url('wp2.png');

    background-size: cover;
    margin: 0;
    padding: 0;
}
p {
    color: rgb(145, 67, 83);
    margin: 10px 0;
}
html, body {
    cursor: url('cursor.png'), auto;
}
a:hover {
    cursor: url('cursorh.png'), auto;
}
.kitchen{
    position: absolute;
    top: 5%;
    left: 35%;
    height:600px;
    width: auto;
}
.dolly{
    position:absolute;
    height:600px;
    width: auto;
}
.bush{
    position: absolute;
    width:600px;
    height: auto;
    transform: rotate(180deg);
    top: -3%;
}

</style>
</head>
<body>
<img src="kitchen.png" class="kitchen">
<img src="bush.png" class="bush" style="left:5%">
