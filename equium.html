<style>
body {
    font-family: Didot, serif;
    background-image: url('sun.jpg');
    background-repeat: repeat-y;
    background-size: cover;
    margin: 0;
    padding: 0;
    text-align: center;
}
html, body {
    cursor: url('cursor.png'), auto;
}
.eq {
    position: absolute;
    height: 1000px;
    left:15%;

}
.overlay-text {
    position: absolute;
    top: 9%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 110px;
    color: rgb(7, 0, 0);
    padding: 10px;
    width:100%;
}
</style>
</head>
<body>
