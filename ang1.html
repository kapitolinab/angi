        <style>
        html, body {
            cursor: url('cursor.png'), auto;
        }
        body {
            font-family: Didot, serif;

            background-repeat: repeat-y;
            background-size: cover;
            margin: 0;
            padding: 0;

        a:hover {
            cursor: url('cursorh.png'), auto;
        }
        p {
            color: rgb(145, 67, 83);

        }
        .circuit{
            position:absolute;
            opacity:0.5;
            top: -10px;
        }
        .judge {
            position: absolute;
            top: 27%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; 
            height: auto;
        }
        .wof {
            position: absolute;
            top: 37%;
            left: 40%;
            transform: translate(-50%, -50%);
            width: 380px; 
            height: auto;
        }
        .death {
            position: absolute;
            top: 36%;
            left: 60%;
            transform: translate(-50%, -50%);
            width: 380px; 
            height: auto;
        }
        .justice{
            position: absolute;
            top: 63%;
            left: 41%;
            transform: translate(-50%, -50%);
            width: 380px; 
            height: auto;
        }
        .devil{
            position: absolute;
            top: 63%;
            left: 58%;
            transform: translate(-50%, -50%);
            width: 380px; 
            height: auto;
        }
        .judge:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }
        .wof:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }
        .death:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }
        .justice:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }
        .devil:hover {

        }
        .screen{
            position: absolute;
            height: 240px;
            width: 240px;
            top: 120px;
            left: 150px;
            transform: rotate(15deg);
        }
        .screent{
            position: absolute;
            height: 240px;
            width: 240px;
            bottom: 120px;
            right: 150px;
            transform: rotate(-345deg);
        }
        .screenpink{
            position: absolute;
            height: 170px;
            width: 170px;
            bottom: 620px;
            right: 187px;
            transform: rotate(-15deg);
        }
        .screenpink2{
            position: absolute;
            height: 170px;
            width: 170px;
            bottom: 128px;
            left: 183px;
            transform: rotate(345deg);
        }
        .wires {
            position: absolute;
            bottom: -10px;
        }
        .monitor{
            position: absolute;
            height: 300px;
            width: 300px;
            pointer-events: none;
        }
        .monitor2{
            position: absolute;
            height: 230px;
            width: 230px;
            pointer-events: none;
        }
        .top-left {
            top: 100px;
            left: 120px;
            transform: rotate(15deg);
        }
        .top-right {
            top: 100px;
            right: 150px;
            transform: rotate(-15deg);
        }
        .bottom-left {
            bottom: 100px;
            left: 150px;
            transform: rotate(345deg);
        }
        .bottom-right {
            bottom: 100px;
            right: 120px;
            transform: rotate(-345deg);
        }
        </style>
   </head>
